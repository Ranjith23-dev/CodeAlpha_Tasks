<!DOCTYPE html>
<html>
<head>
    <title>RekShoppe</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background: #111827;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .navbar h2 {
            margin: 0;
            color: #00d4ff;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-links a:hover {
            color: #00d4ff;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #00d4ff, #0077ff);
            color: white;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* PRODUCT GRID */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-size: 18px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #16a34a;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            background: #111827;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">🛒 RekShoppe</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart/">🛒 Cart</a>
        <a href="/orders/">📦 Orders</a>
        <a href="/register/">👤 Register</a>
        <a href="/login/">Login</a>
    </div>
</div>

{% block content %}
{% endblock %}

<div class="footer">
    © 2026 RekShoppe. All Rights Reserved.
</div>

</body>
</html>
